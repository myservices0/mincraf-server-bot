<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>24/7 Server Bot Panel</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .panel-container {
            background-color: #1f2833;
            padding: 30px;
            border-radius: 12px;
            border: 2px solid #66fcf1;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.2);
            width: 350px;
        }
        h2 { text-align: center; color: #66fcf1; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; }
        input {
            width: 100%;
            padding: 10px;
            background-color: #0b0c10;
            border: 1px solid #45f3ff;
            border-radius: 6px;
            color: #fff;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #66fcf1;
            border: none;
            border-radius: 6px;
            color: #0b0c10;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover { background-color: #45f3ff; box-shadow: 0 0 10px rgba(69, 243, 255, 0.5); }
        #status { margin-top: 15px; text-align: center; font-weight: bold; color: #ff4a4a; }
    </style>
</head>
<body>

<div class="panel-container">
    <h2>BOT CONTROLLER</h2>
    <div class="input-group">
        <label>Server IP / Hostname</label>
        <input type="text" id="srvIp" placeholder="example.aternos.me">
    </div>
    <div class="input-group">
        <label>Internal Connection Port</label>
        <input type="number" id="srvPort" placeholder="25565">
    </div>
    <button onclick="deployBot()">DEPLOY 24/7 BOT</button>
    <div id="status">Status: Disconnected</div>
</div>

<script>
    async function deployBot() {
        const ip = document.getElementById('srvIp').value;
        const port = document.getElementById('srvPort').value;
        const statusDiv = document.getElementById('status');

        if(!ip || !port) {
            statusDiv.innerText = "Error: Fill out all parameters.";
            return;
        }

        statusDiv.style.color = "#ffeb3b";
        statusDiv.innerText = "Deploying network handshake...";

        try {
            const response = await fetch('/api/deploy', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ip, port: parseInt(port) })
            });
            const data = await response.json();
            if(data.success) {
                statusDiv.style.color = "#00e676";
                statusDiv.innerText = "Status: Bot deployed successfully!";
            } else {
                statusDiv.style.color = "#ff4a4a";
                statusDiv.innerText = "Error: " + data.message;
            }
        } catch (err) {
            statusDiv.style.color = "#ff4a4a";
            statusDiv.innerText = "Failed to connect to core backend.";
        }
    }
</script>
</body>
</html>
